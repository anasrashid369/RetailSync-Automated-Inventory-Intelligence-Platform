AWSTemplateFormatVersion: '2010-09-09'
Description: RetailSync - Automated Inventory Intelligence Platform

Parameters:
  AlertEmail:
    Type: String
    Description: Email address for low stock alerts

Resources:

  UploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'retailsync-uploads-cfn-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  ProcessedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'retailsync-processed-cfn-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  InventoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: RetailSync-Inventory-CFN
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: product_id
          AttributeType: S
        - AttributeName: supplier
          AttributeType: S
      KeySchema:
        - AttributeName: product_id
          KeyType: HASH
        - AttributeName: supplier
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

  AlertsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: RetailSync-Alerts-CFN
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: alert_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: alert_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE

  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: RetailSync-CFN-Alerts
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmail

  ProcessorLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RetailSync-CFN-ProcessorRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RetailSync-CFN-ProcessorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:DeleteObject
                Resource: !Sub 'arn:aws:s3:::retailsync-uploads-cfn-${AWS::AccountId}/*'
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:CopyObject
                Resource: !Sub 'arn:aws:s3:::retailsync-processed-cfn-${AWS::AccountId}/*'
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:GetItem
                Resource: !GetAtt InventoryTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt AlertsTable.Arn
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref AlertsTopic
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: 'arn:aws:logs:*:*:*'

  QueryLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RetailSync-CFN-QueryRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RetailSync-CFN-QueryPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource: !GetAtt InventoryTable.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: 'arn:aws:logs:*:*:*'

Outputs:
  UploadsBucketName:
    Description: Upload CSVs here to trigger processing
    Value: !Ref UploadsBucket

  InventoryTableName:
    Description: DynamoDB inventory table name
    Value: !Ref InventoryTable

  AlertsTopicArn:
    Description: SNS alerts topic ARN
    Value: !Ref AlertsTopic
